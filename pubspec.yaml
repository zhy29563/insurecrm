  url_launcher: ^6.3.0
  speech_to_text: ^7.0.0
  camera: ^0.10.5+9
  crypto: ^3.0.3
  table_calendar: ^3.0.9
  fl_chart: ^0.68.0
  share_plus: ^7.2.1
  image: ^4.3.0
  shared_preferences: ^2.2.3
